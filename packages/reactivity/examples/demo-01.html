<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简单的 effect 实现</title>
</head>

<body>

  <script type="module">
    import { ref, effect } from '../dist/reactivity.esm.js'

    const count = ref(1)

    effect(() => {
      console.log('effect 1 value====', count.value)
    })

    effect(() => {
      console.log('effect 2 value====', count.value)
    })

    setTimeout(() => {
      count.value = 2
    }, 1000);
  </script>

</body>

</html>
