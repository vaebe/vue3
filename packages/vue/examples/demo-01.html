<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>createRenderer 函数</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
  <div id="app"></div>
  <script type="module">
    import { ref, renderOptions } from '../dist/vue.esm.js'

    const { createRenderer, h } = Vue

    const { render, createApp } = createRenderer(renderOptions)

    console.log(renderOptions)

    const vnode = h('div',
      {
        class: 'add',
        style: { color: 'red' },
        onClick: () => {
          console.log('这是 vnode click')
        },
        id: 'vnode'
      },
      'hello word!')

    const vnode2 = h('div',
      {
        class: 'red',
        style: { color: 'blue', backgroundColor: 'black' },
        onClick: () => {
          console.log('这是 vnode vnode2')
        },
        id: 'vnode2',
        ws: '10098'
      },
      'hello word!')
    render(vnode, app)

    setTimeout(() => {
      render(vnode2, app)
    }, 3000)
  </script>
</body>

</html>
